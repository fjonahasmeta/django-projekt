{% extends 'agency/base.html' %}

{% block content %}

<style>

.hero {
    text-align: center;
    padding: 80px 20px 40px;
}

.hero h1 {
    font-size: 44px;
    font-weight: 800;
    color: #E8E6E0;
}

.hero p {
    color: #8A8680;
    margin-top: 10px;
}

.search-box {
    margin-top: 25px;
    display: flex;
    justify-content: center;
}

.search-box input {
    width: 420px;
    padding: 12px 18px;
    border-radius: 30px;
    border: 1px solid rgba(201,168,76,0.25);
    background: #111318;
    color: #E8E6E0;
    outline: none;
    transition: 0.3s;
}

.search-box input:focus {
    border-color: #C9A84C;
    width: 460px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    padding: 40px;
}

.card {
    background: #161A22;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    border-color: rgba(201,168,76,0.4);
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

.card img {
    height: 220px;
    width: 100%;
    object-fit: cover;
    filter: brightness(0.85);
}

.card-body {
    padding: 18px;
}

.card h5 {
    color: #E8E6E0;
    font-weight: 600;
}

.card p {
    color: #8A8680;
    font-size: 14px;
}

.btn-view {
    display: inline-block;
    margin-top: 10px;
    padding: 7px 14px;
    border-radius: 20px;
    background: #C9A84C;
    color: #0D0D0D;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
}

.btn-view:hover {
    opacity: 0.85;
}

@media(max-width: 900px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width: 600px) {
    .grid {
        grid-template-columns: 1fr;
    }

    .search-box input {
        width: 90%;
    }
}

</style>

<!-- HERO -->
<div class="hero">
    <h1>Find Your Next Adventure 🌍</h1>
    <p>Discover premium destinations & book unforgettable trips</p>

    <form method="GET" class="search-box">
        <input type="text" name="q" placeholder="Search destinations...">
    </form>
</div>

<!-- GRID -->
<div class="grid">

    {% for post in posts %}

    <div class="card">

        {% if post.image %}
            <img src="{{ post.image.url }}">
        {% endif %}

        <div class="card-body">

            <h5>{{ post.title }}</h5>

            <p>{{ post.content|truncatechars:90 }}</p>

            <a href="{% url 'detail' post.id %}" class="btn-view">
                View Trip →
            </a>

        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
